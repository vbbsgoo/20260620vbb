<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다기능 타이머 & 스톱워치 (단축키 지원)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #f8fafc;
            padding: 20px;
        }

        .app-container {
            background: #1e293b;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 760px;
            border: 1px solid #334155;
            transition: background-color 0.2s;
            position: relative;
        }

        /* 10초 미만 경고 애니메이션 */
        @keyframes blink {
            0% { background-color: #1e293b; }
            50% { background-color: #991b1b; }
            100% { background-color: #1e293b; }
        }

        .warning-active {
            animation: blink 1s infinite;
        }

        /* 탭 메뉴 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: #334155;
            color: #94a3b8;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        /* 메인 디스플레이 */
        .display {
            font-size: 96px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 40px;
            font-family: monospace;
            letter-spacing: 4px;
        }

        /* 퀵 타이머 버튼 */
        .quick-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quick-btn {
            background: #475569;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }

        .quick-btn:hover {
            background: #64748b;
        }

        /* 실시간 시간 가감 조절 버튼 */
        .adjust-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .adjust-btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }

        .adjust-btn:hover {
            background: #0369a1;
        }

        /* 입력 필드 영역 */
        .inputs-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .input-group input {
            width: 100px;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            border: 2px solid #475569;
            border-radius: 12px;
            outline: none;
            background: #0f172a;
            color: white;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
        }

        /* 하단 제어 버튼 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .control-btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: 700;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-start { background-color: #10b981; color: white; }
        .btn-start:hover { background-color: #059669; }

        .btn-pause { background-color: #f59e0b; color: white; display: none; }
        .btn-pause:hover { background-color: #d97706; }

        .btn-reset { background-color: #ef4444; color: white; }
        .btn-reset:hover { background-color: #dc2626; }

        /* 단축키 가이드 안볼 수 있게 하단에 작게 배치 */
        .shortcut-guide {
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .shortcut-guide code {
            background: #334155;
            color: #f8fafc;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        /* 스톱워치 기록 목록 */
        .laps-container {
            margin-top: 30px;
            max-height: 150px;
            overflow-y: auto;
            background: #0f172a;
            border-radius: 12px;
            padding: 15px;
            display: none;
            text-align: left;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid #334155;
            font-size: 18px;
            font-family: monospace;
        }

        .lap-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <!-- 상단 탭 -->
        <div class="tabs">
            <button class="tab-btn active" id="timerTabBtn" onclick="switchMode('timer')">타이머</button>
            <button class="tab-btn" id="stopwatchTabBtn" onclick="switchMode('stopwatch')">스톱워치</button>
        </div>
        
        <!-- 대형 메인 디스플레이 -->
        <div class="display" id="mainDisplay">00:00:00</div>
        
        <!-- [타이머 전용 콘텐츠] -->
        <div id="timerContent">
            <!-- 퀵 설정 버튼 -->
            <div class="quick-buttons">
                <button class="quick-btn" onclick="setQuickTimer(1)">1분</button>
                <button class="quick-btn" onclick="setQuickTimer(3)">3분</button>
                <button class="quick-btn" onclick="setQuickTimer(5)">5분</button>
                <button class="quick-btn" onclick="setQuickTimer(10)">10분</button>
            </div>

            <!-- 시간 조절 가감 버튼 -->
            <div class="adjust-buttons">
                <button class="adjust-btn" onclick="adjustTime(60)">+1분 (▶)</button>
                <button class="adjust-btn" onclick="adjustTime(-60)">-1분 (◀)</button>
                <button class="adjust-btn" onclick="adjustTime(10)">+10초 (▲)</button>
                <button class="adjust-btn" onclick="adjustTime(-10)">-10초 (▼)</button>
            </div>
            
            <!-- 시간 입력창 -->
            <div class="inputs-wrapper" id="inputsContainer">
                <div class="input-group">
                    <label>시</label>
                    <input type="number" id="hours" min="0" max="99" value="0">
                </div>
                <div class="input-group">
                    <label>분</label>
                    <input type="number" id="minutes" min="0" max="59" value="0">
                </div>
                <div class="input-group">
                    <label>초</label>
                    <input type="number" id="seconds" min="0" max="59" value="0">
                </div>
            </div>
        </div>

        <!-- [스톱워치 기록 목록] -->
        <div class="laps-container" id="lapsContainer"></div>

        <!-- 공통 하단 컨트롤 버튼 -->
        <div class="controls">
            <button class="control-btn btn-start" id="startBtn">시작</button>
            <button class="control-btn btn-pause" id="pauseBtn">일시정지</button>
            <button class="control-btn btn-reset" id="resetBtn">초기화</button>
        </div>

        <!-- 단축키 안내 가이드 -->
        <div class="shortcut-guide">
            💡 <b>키보드 단축키 안내:</b><br>
            • <code>Spacebar</code> : 시작 / 일시정지 (일시정지 상태에서 한 번 더 누르면 <b>초기화</b>)<br>
            • <code>위(▲) / 아래(▼) 방향키</code> : 시간 10초 추가 / 차감 (타이머 전용)<br>
            • <code>오른쪽(▶) / 왼쪽(◀) 방향키</code> : 시간 1분 추가 / 차감 (타이머 전용)
        </div>
    </div>

    <script>
        // 오디오 컨텍스트 객체 생성
        let audioCtx = null;
        function playBeep(frequency, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.value = frequency;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log(e); }
        }

        // 상태 변수들
        let currentMode = 'timer';
        let timerInterval = null;
        let stopwatchInterval = null;
        
        // 타이머용 변수
        let timerSeconds = 0;
        let isTimerPaused = false;
        let hasStartedOnce = false; // 타이머가 완전히 처음 시작 상태인지 체크
        
        // 스톱워치용 변수
        let stopwatchTime = 0;
        let isStopwatchRunning = false;
        let lapCount = 0;

        // DOM 요소
        const appContainer = document.getElementById('appContainer');
        const mainDisplay = document.getElementById('mainDisplay');
        const timerContent = document.getElementById('timerContent');
        const lapsContainer = document.getElementById('lapsContainer');
        
        const hoursInput = document.getElementById('hours');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const inputsContainer = document.getElementById('inputsContainer');
        
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 모드 전환 기능
        function switchMode(mode) {
            if (currentMode === mode) return;
            
            resetTimer();
            resetStopwatch();
            
            currentMode = mode;
            
            document.getElementById('timerTabBtn').classList.toggle('active', mode === 'timer');
            document.getElementById('stopwatchTabBtn').classList.toggle('active', mode === 'stopwatch');
            
            if (mode === 'timer') {
                timerContent.style.display = 'block';
                lapsContainer.style.display = 'none';
                mainDisplay.textContent = "00:00:00";
                startBtn.textContent = "시작";
            } else {
                timerContent.style.display = 'none';
                lapsContainer.style.display = 'block';
                mainDisplay.textContent = "00:00:00.00";
                startBtn.textContent = "시작";
            }
        }

        // 공통 버튼 이벤트 바인딩
        startBtn.addEventListener('click', () => {
            if (currentMode === 'timer') startTimer();
            else startStopwatch();
        });
        
        pauseBtn.addEventListener('click', () => {
            if (currentMode === 'timer') pauseTimer();
            else pauseStopwatch();
        });
        
        resetBtn.addEventListener('click', () => {
            if (currentMode === 'timer') resetTimer();
            else resetStopwatch();
        });

        /* ==================== [키보드 단축키 추가 로직] ==================== */
        window.addEventListener('keydown', (e) => {
            // 인풋 박스에 포커스가 있을 때는 단축키 오작동 방지하기 위함
            if (document.activeElement.tagName === 'INPUT') {
                if (e.key === 'Enter' || e.key === 'Escape') {
                    document.activeElement.blur();
                }
                return;
            }

            // 1 & 2번 조건: 방향키로 시간 가감 (타이머 모드일 때만 동작)
            if (currentMode === 'timer') {
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    adjustTime(10); // 위 방향키 -> +10초
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    adjustTime(-10); // 아래 방향키 -> -10초
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    adjustTime(60); // 오른쪽 방향키 -> +1분
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    adjustTime(-60); // 왼쪽 방향키 -> -1분
                }
            }

            // 3번 조건: 스페이스바 제어
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault(); // 스페이스바 누를 시 브라우저 스크롤 내려감 방지
                
                if (currentMode === 'timer') {
                    if (timerInterval) {
                        // 1. 작동 중일 때 누르면 일시정지
                        pauseTimer();
                    } else if (isTimerPaused && hasStartedOnce) {
                        // 3. 일시정지 상태에서 한 번 더 누르면 초기화
                        resetTimer();
                    } else {
                        // 2. 멈춰있거나 대기 상태일 때 누르면 시작/재개
                        startTimer();
                    }
                } else {
                    // 스톱워치 모드 스페이스바 대응
                    if (isStopwatchRunning) {
                        pauseStopwatch();
                    } else if (!isStopwatchRunning && stopwatchTime > 0) {
                        resetStopwatch();
                    } else {
                        startStopwatch();
                    }
                }
            }
        });

        /* ==================== [타이머 로직] ==================== */
        function formatTimerTime(totalSecs) {
            if (totalSecs < 0) totalSecs = 0;
            const h = Math.floor(totalSecs / 3600);
            const m = Math.floor((totalSecs % 3600) / 60);
            const s = totalSecs % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            mainDisplay.textContent = formatTimerTime(timerSeconds);
            
            if (timerSeconds <= 10 && timerSeconds > 0 && timerInterval) {
                appContainer.classList.add('warning-active');
            } else {
                appContainer.classList.remove('warning-active');
            }
        }

        function startTimer() {
            if (!isTimerPaused) {
                const h = parseInt(hoursInput.value) || 0;
                const m = parseInt(minutesInput.value) || 0;
                const s = parseInt(secondsInput.value) || 0;
                timerSeconds = (h * 3600) + (m * 60) + s;

                if (timerSeconds <= 0) {
                    alert("시간을 입력하거나 퀵 버튼 혹은 방향키를 눌러주세요!");
                    return;
                }
            }

            inputsContainer.style.visibility = 'hidden';
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            isTimerPaused = false;
            hasStartedOnce = true; // 작동 시작됨 표시

            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();

                if (timerSeconds <= 10 && timerSeconds > 0) {
                    playBeep(880, 0.1);
                }

                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    appContainer.classList.remove('warning-active');
                    
                    playBeep(440, 0.8);
                    setTimeout(() => playBeep(440, 0.8), 200);
                    
                    alert("🔔 시간이 모두 만료되었습니다!");
                    resetTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isTimerPaused = true;
            startBtn.style.display = 'inline-block';
            startBtn.textContent = '재개';
            pauseBtn.style.display = 'none';
            appContainer.classList.remove('warning-active');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timerSeconds = 0;
            isTimerPaused = false;
            hasStartedOnce = false; // 플래그 초기화

            mainDisplay.textContent = "00:00:00";
            inputsContainer.style.visibility = 'visible';
            startBtn.style.display = 'inline-block';
            startBtn.textContent = '시작';
            pauseBtn.style.display = 'none';
            appContainer.classList.remove('warning-active');
            
            hoursInput.value = 0;
            minutesInput.value = 0;
            secondsInput.value = 0;
        }

        function setQuickTimer(minutes) {
            resetTimer();
            timerSeconds = minutes * 60;
            isTimerPaused = true;
            startTimer();
        }

        function adjustTime(secondsToAdd) {
            if (!timerInterval && !isTimerPaused) {
                let total = (parseInt(hoursInput.value)||0)*3600 + (parseInt(minutesInput.value)||0)*60 + (parseInt(secondsInput.value)||0);
                total = Math.max(0, total + secondsToAdd);
                hoursInput.value = Math.floor(total / 3600);
                minutesInput.value = Math.floor((total % 3600) / 60);
                secondsInput.value = total % 60;
                mainDisplay.textContent = formatTimerTime(total);
            } else {
                timerSeconds += secondsToAdd;
                if (timerSeconds < 0) timerSeconds = 0;
                updateTimerDisplay();
            }
        }

        /* ==================== [스톱워치 로직] ==================== */
        function formatStopwatchTime(ms) {
            const totalSecs = Math.floor(ms / 1000);
            const h = Math.floor(totalSecs / 3600);
            const m = Math.floor((totalSecs % 3600) / 60);
            const s = totalSecs % 60;
            const milli = Math.floor((ms % 1000) / 10);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(milli).padStart(2, '0')}`;
        }

        function startStopwatch() {
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            pauseBtn.textContent = '일시정지';
            resetBtn.textContent = "기록"; 

            let startTime = Date.now() - stopwatchTime;
            stopwatchInterval = setInterval(() => {
                stopwatchTime = Date.now() - startTime;
                mainDisplay.textContent = formatStopwatchTime(stopwatchTime);
            }, 10);
            isStopwatchRunning = true;
        }

        function pauseStopwatch() {
            clearInterval(stopwatchInterval);
            stopwatchInterval = null;
            startBtn.style.display = 'inline-block';
            startBtn.textContent = '재개';
            pauseBtn.style.display = 'none';
            resetBtn.textContent = "초기화";
            isStopwatchRunning = false;
        }

        function resetStopwatch() {
            if (isStopwatchRunning) {
                lapCount++;
                const lapDiv = document.createElement('div');
                lapDiv.className = 'lap-item';
                lapDiv.innerHTML = `<span>기록 ${lapCount}</span><span>${formatStopwatchTime(stopwatchTime)}</span>`;
                lapsContainer.insertBefore(lapDiv, lapsContainer.firstChild);
            } else {
                clearInterval(stopwatchInterval);
                stopwatchInterval = null;
                stopwatchTime = 0;
                lapCount = 0;
                mainDisplay.textContent = "00:00:00.00";
                startBtn.style.display = 'inline-block';
                startBtn.textContent = '시작';
                pauseBtn.style.display = 'none';
                resetBtn.textContent = "초기화";
                lapsContainer.innerHTML = '';
            }
        }
    </script>
</body>
</html>
