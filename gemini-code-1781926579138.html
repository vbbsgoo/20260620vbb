<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00초등학교 교직원 연수물 수합 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        .status-empty { background-color: #fee2e2; } /* Red-50 */
        .status-filled { background-color: #dcfce7; } /* Green-50 */
        .drop-zone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6">

    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <header class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-900">🏫 00초등학교 교직원 연수물 수합 관리</h1>
            <div class="space-x-2">
                <button onclick="toggleModal('staffModal')" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm font-medium transition">👥 교직원 명단 수정</button>
                <button onclick="toggleModal('trainingModal')" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm font-medium transition">📚 연수 목록 수정</button>
                <button onclick="clearAllData()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded text-sm font-medium transition">데이터 초기화</button>
            </div>
        </header>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse border border-gray-200 shadow-sm rounded-lg" id="mainTable">
                <thead>
                    <tr class="bg-gray-100 text-gray-700">
                        <th class="border border-gray-200 p-3 w-24">성명</th>
                        <th class="border border-gray-200 p-3 w-24">직위</th>
                        </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="staffModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h2 class="text-xl font-bold mb-4">👥 교직원 명단 설정</h2>
            <p class="text-xs text-gray-500 mb-2">한 줄에 '이름,직위' 형식으로 입력해주세요. (예: 홍길동,교사)</p>
            <textarea id="staffInput" class="w-full h-64 border p-2 rounded font-mono text-sm mb-4" placeholder="홍길동,교사&#10;김철수,행정실장"></textarea>
            <div class="flex justify-end space-x-2">
                <button onclick="toggleModal('staffModal')" class="bg-gray-300 px-4 py-2 rounded text-sm">취소</button>
                <button onclick="saveStaff()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">저장</button>
            </div>
        </div>
    </div>

    <div id="trainingModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h2 class="text-xl font-bold mb-4">📚 연수 목록 및 기한 설정</h2>
            <p class="text-xs text-gray-500 mb-2">한 줄에 '연수명,기한(YYYY-MM-DD)' 형식으로 입력해주세요.</p>
            <textarea id="trainingInput" class="w-full h-64 border p-2 rounded font-mono text-sm mb-4" placeholder="안전교육,2026-07-31&#10;다문화교육,2026-11-30"></textarea>
            <div class="flex justify-end space-x-2">
                <button onclick="toggleModal('trainingModal')" class="bg-gray-300 px-4 py-2 rounded text-sm">취소</button>
                <button onclick="saveTraining()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">저장</button>
            </div>
        </div>
    </div>

    <script>
        // PDF.js 워커 세팅
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // 초기/기본 데이터 구성
        let staffList = JSON.parse(localStorage.getItem('staffList')) || [
            { name: "홍길동", position: "교사" },
            { name: "김철수", position: "행정실장" }
        ];

        let trainingList = JSON.parse(localStorage.getItem('trainingList')) || [
            { title: "안전교육", duedate: "2026-07-31" },
            { title: "다문화교육", duedate: "2026-11-30" }
        ];

        // 이수 데이터 매핑 (Key: "이름_연수명" -> Value: { docNum: "이수번호", fileName: "파일명" })
        let complianceData = JSON.parse(localStorage.getItem('complianceData')) || {};

        // 모달 토글 함수
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                if (id === 'staffModal') {
                    document.getElementById('staffInput').value = staffList.map(s => `${s.name},${s.position}`).join('\n');
                } else if (id === 'trainingModal') {
                    document.getElementById('trainingInput').value = trainingList.map(t => `${t.title},${t.duedate}`).join('\n');
                }
            }
        }

        // 교직원 데이터 저장
        function saveStaff() {
            const text = document.getElementById('staffInput').value.trim();
            staffList = text.split('\n').filter(line => line.includes(',')).map(line => {
                const [name, position] = line.split(',');
                return { name: name.trim(), position: position.trim() };
            });
            localStorage.setItem('staffList', JSON.stringify(staffList));
            toggleModal('staffModal');
            renderTable();
        }

        // 연수 목록 데이터 저장
        function saveTraining() {
            const text = document.getElementById('trainingInput').value.trim();
            trainingList = text.split('\n').filter(line => line.includes(',')).map(line => {
                const [title, duedate] = line.split(',');
                return { title: title.trim(), duedate: duedate.trim() };
            });
            localStorage.setItem('trainingList', JSON.stringify(trainingList));
            toggleModal('trainingModal');
            renderTable();
        }

        // 전체 데이터 초기화
        function clearAllData() {
            if(confirm("모든 업로드 내역과 설정이 초기화됩니다. 진행하시겠습니까?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 메인 테이블 렌더링 함수
        function renderTable() {
            const table = document.getElementById('mainTable');
            const tbody = document.getElementById('tableBody');
            
            // 기존 헤더 초기화 및 재생성
            const theadTr = table.querySelector('thead tr');
            theadTr.innerHTML = '<th class="border border-gray-200 p-3 w-24">성명</th><th class="border border-gray-200 p-3 w-24">직위</th>';
            
            trainingList.forEach(t => {
                const th = document.createElement('th');
                th.className = "border border-gray-200 p-3 min-w-[220px] text-center text-sm font-semibold";
                th.innerHTML = `<div>${t.title}</div><div class="text-xs font-normal text-red-600 mt-1">⏳ 기한: ${t.duedate}</div>`;
                theadTr.appendChild(th);
            });

            // 바디 셀 생성
            tbody.innerHTML = '';
            staffList.forEach(staff => {
                const tr = document.createElement('tr');
                
                // 이름 / 직위 셀
                tr.innerHTML = `
                    <td class="border border-gray-200 p-3 text-center font-medium bg-gray-50">${staff.name}</td>
                    <td class="border border-gray-200 p-3 text-center text-sm text-gray-600 bg-gray-50">${staff.position}</td>
                `;

                // 연수별 상태 셀 생성
                trainingList.forEach(train => {
                    const td = document.createElement('td');
                    td.className = "border border-gray-200 p-3 text-xs transition-colors duration-200 text-center";
                    
                    const dataKey = `${staff.name}_${train.title}`;
                    const record = complianceData[dataKey];

                    if (record) {
                        // 이수 완료 상태 UI (🟢 Green)
                        td.classList.add('status-filled');
                        td.innerHTML = `
                            <div class="font-semibold text-green-700 mb-1">✅ 이수 완료</div>
                            <div class="text-[11px] text-gray-500 truncate mb-1" title="${record.fileName}">📄 ${record.fileName}</div>
                            <input type="text" value="${record.docNum}" onchange="updateDocNum('${dataKey}', this.value)" class="w-full p-1 border rounded bg-white text-center text-gray-700 font-mono" placeholder="이수번호 수동입력">
                            <button onclick="deleteRecord('${dataKey}')" class="mt-2 text-red-500 hover:text-red-700 font-semibold text-[11px]">✕ 이수증 삭제</button>
                        `;
                    } else {
                        // 미이수 상태 UI (🔴 Red + Drag & Drop 구역)
                        td.classList.add('status-empty');
                        td.innerHTML = `
                            <div class="drop-zone border-2 border-dashed border-gray-300 rounded p-3 cursor-pointer hover:bg-red-100/50"
                                 ondragover="handleDragOver(event)" 
                                 ondragleave="handleDragLeave(event)" 
                                 ondrop="handleDrop(event, '${dataKey}')"
                                 onclick="triggerFileInput('${dataKey}')">
                                <span class="text-gray-400 font-medium">드래그 또는 클릭하여 PDF 업로드</span>
                            </div>
                            <input type="file" id="file_${dataKey}" accept=".pdf" class="hidden" onchange="handleFileSelect(event, '${dataKey}')">
                        `;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        /* 📁 파일 처리 및 드래그앤드롭 이벤트 핸들러 */
        function triggerFileInput(key) {
            document.getElementById(`file_${key}`).click();
        }
        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
        
        function handleDrop(e, key) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) processPDF(files[0], key);
        }

        function handleFileSelect(e, key) {
            const files = e.target.files;
            if (files.length > 0) processPDF(files[0], key);
        }

        /* 🔍 PDF 내 텍스트 파싱 및 이수번호 추출 (핵심) */
        function processPDF(file, key) {
            if (file.type !== 'application/pdf') {
                alert('PDF 파일만 업로드 가능합니다.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const typedarray = new Uint8Array(e.target.result);
                
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    let maxPages = pdf.numPages;
                    let countPromises = [];
                    
                    // 각 페이지의 텍스트 추출 취합
                    for (let j = 1; j <= maxPages; j++) {
                        countPromises.push(pdf.getPage(j).then(page => {
                            return page.getTextContent().then(content => {
                                return content.items.map(item => item.str).join(' ');
                            });
                        }));
                    }
                    
                    return Promise.all(countPromises);
                }).then(function(pageTexts) {
                    const fullText = pageTexts.join(' ');
                    
                    // 정규표현식 매칭 패턴: 보내주신 유형을 포함하여 '제 ~~호' 사이의 문자열 검출
                    // 예: "제 중앙교육연수원-원격-2026-467556 호" 검출 가능
                    const regex = /제\s*([^\n호]*?\d{4}-\d+)\s*호/g;
                    const match = regex.exec(fullText);
                    
                    let extractedNum = "";
                    if (match) {
                        // "제"와 "호"를 정돈하여 온전한 이수번호 형태로 자동 저장
                        extractedNum = match[0].replace(/\s+/g, ' ').trim();
                    } else {
                        extractedNum = "자동 인식 실패 (수동 입력 필요)";
                    }

                    // 데이터 저장 및 갱신
                    complianceData[key] = {
                        docNum: extractedNum,
                        fileName: file.name
                    };
                    localStorage.setItem('complianceData', JSON.stringify(complianceData));
                    renderTable();

                }).catch(err => {
                    alert('PDF 분석 중 오류가 발생했습니다: ' + err.message);
                });
            };
            reader.readAsArrayBuffer(file);
        }

        // 수동으로 이수번호 수정할 때 데이터 업데이트
        function updateDocNum(key, value) {
            if (complianceData[key]) {
                complianceData[key].docNum = value;
                localStorage.setItem('complianceData', JSON.stringify(complianceData));
            }
        }

        // 이수증 내역 삭제
        function deleteRecord(key) {
            if(confirm("등록된 이수증 정보를 삭제하시겠습니까?")) {
                delete complianceData[key];
                localStorage.setItem('complianceData', JSON.stringify(complianceData));
                renderTable();
            }
        }

        // 첫 페이지 로드 시 테이블 그리기
        window.onload = renderTable;
    </script>
</body>
</html>
